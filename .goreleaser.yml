version: 2

builds:
  - id: keep
    main: ./cmd/keep
    binary: keep
    ldflags:
      - -s -w
      - -X github.com/majorcontext/keep/cmd/keep/cli.version={{.Version}}
      - -X github.com/majorcontext/keep/cmd/keep/cli.commit={{.ShortCommit}}
      - -X github.com/majorcontext/keep/cmd/keep/cli.date={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: keep-mcp-relay
    main: ./cmd/keep-mcp-relay
    binary: keep-mcp-relay
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

  - id: keep-llm-gateway
    main: ./cmd/keep-llm-gateway
    binary: keep-llm-gateway
    ldflags:
      - -s -w
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
