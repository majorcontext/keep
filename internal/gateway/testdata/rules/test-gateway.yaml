scope: test-gateway
mode: enforce
rules:
  - name: redact-secrets
    match:
      operation: "llm.tool_result"
    action: redact
    redact:
      target: "params.content"
      patterns:
        - match: "SECRET_[A-Z_]+"
          replace: "[REDACTED]"
  - name: block-destructive
    match:
      operation: "llm.tool_use"
      when: "params.name == 'bash' && params.input.command.contains('rm -rf')"
    action: deny
    message: "Destructive command blocked."
  - name: context-size-limit
    match:
      operation: "llm.request"
      when: "params.token_estimate > 100000"
    action: deny
    message: "Context too large."
  - name: redact-response-text-secrets
    match:
      operation: "llm.text"
      when: "params.text.contains('SECRET_')"
    action: redact
    redact:
      target: "params.text"
      patterns:
        - match: "SECRET_[A-Z_]+"
          replace: "[REDACTED]"
