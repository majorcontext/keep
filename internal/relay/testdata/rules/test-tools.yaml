scope: test-scope
mode: enforce
rules:
  - name: block-dangerous
    match:
      operation: "dangerous_tool"
    action: deny
    message: "This tool is blocked by policy."
  - name: redact-secrets
    match:
      operation: "read_file"
    action: redact
    redact:
      target: "params.content"
      patterns:
        - match: "SECRET_[A-Z]+"
          replace: "[REDACTED]"
