scope: test-response-scope
mode: enforce
rules:
  - name: redact-passwords
    match:
      operation: "read_query"
      when: "context.direction == 'response'"
    action: redact
    redact:
      target: "params.content"
      patterns:
        - match: "hunter2|p@ssw0rd!"
          replace: "********"
  - name: block-writes
    match:
      operation: "write_query"
    action: deny
    message: "Database is read-only."
